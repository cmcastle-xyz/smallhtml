<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <style>
    * {

      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f7f9fc;
      padding: 30px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    h1 {
      color: #2f8dff;
      margin-bottom: 20px;
      font-size: 28px;
    }
    p {
      color: #444;
      line-height: 1.7;
      font-size: 16px;
      margin-bottom: 14px;
    }
    .card {
      padding: 20px;
      background: #f0f7ff;
      border-radius: 10px;
      margin-top: 20px;
    }

</head>
<body>
  <div class="container">
    <h1>🍽️ 我的云餐厅</h1>
    <p>轻松创建、管理和分享您的餐厅菜单</p>
    <div class="card">
      <p>✅ 网站已成功部署到 GitHub Pages</p>
      <p>✅ 支持手机 / 电脑访问</p>
      <p>✅ 任何人打开链接即可使用</p>
    </div>
  </div>

</html>
